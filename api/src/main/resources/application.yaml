spring:
  application:
    name: noban
    version: ${NOBAN_VERSION:latest}
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/noban}
    username: ${DATABASE_USERNAME:admin}
    password: ${DATABASE_PASSWORD:admin}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        "[format_sql]": true

jwt:
  private-key: ${JWT_PRIVATE_KEY:classpath:private.key}
  public-key: ${JWT_PUBLIC_KEY:classpath:public.key}
  algorithm: ${JWT_ALGORITHM:EC}
  issuer: ${JWT_ISSUER:noban-api}
  access-expiration-time: ${JWT_EXPIRATION_TIME:300000}
  refresh-expiration-time: ${JWT_EXPIRATION_TIME:300000}